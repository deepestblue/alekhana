name: Zizmor Audit

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-workflows:
    name: Audit GitHub workflows with zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install zizmor
        run: python3 -m pip install --upgrade zizmor

      - name: Run zizmor auditor checks
        run: zizmor --persona=auditor .github/workflows
